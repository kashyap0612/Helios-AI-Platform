services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, backend]
  frontend:
    build: { context: ./frontend }
  backend:
    build: { context: ./backend }
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      POSTGRES_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/helios
    depends_on: [redis, postgres, qdrant]
  redis: { image: redis:7-alpine }
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: helios }
  qdrant: { image: qdrant/qdrant:v1.11.1 }
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes: ["./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
  grafana:
    image: grafana/grafana:11.1.4
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on: [prometheus, loki]
  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/local-config.yaml
    volumes: ["./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro"]
  jaeger:
    image: jaegertracing/all-in-one:1.60
